services:
  - type: web
    name: mountaineyes-proxy
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ALLOWED_ORIGINS
        value: https://mountaineyes.kr,https://mountaineyes-proxy.onrender.com
